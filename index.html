<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinemaLife — Your Lifetime at the Movies</title>
<style>
/* ─── Design Tokens ──────────────────────────────────────── */
:root {
  --bg:        #0d0d0d;
  --surface:   #1a1a1a;
  --card-bg:   #111;
  --accent:    #e8b84b;
  --accent2:   #e84b4b;
  --text:      #f0f0f0;
  --muted:     #888;
  --radius:    1rem;
  --card-w:    min(340px, 88vw);
  --card-h:    min(510px, 78vh);
  --font:      system-ui, -apple-system, sans-serif;

  /* swipe direction colours */
  --col-yes:   #4bde80;
  --col-no:    #e84b4b;
  --col-down:  #4b9de8;
  --col-up:    #e8b84b;
}

/* ─── Reset & Base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
}
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}
button:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
a { color: var(--accent); }

/* ─── Screens ────────────────────────────────────────────── */
.screen { display: none; width: 100%; max-width: 600px; padding: 1.5rem; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ─── Screen 1: Name Entry ───────────────────────────────── */
#screen-name {
  gap: 1.5rem;
  text-align: center;
}
#screen-name h1 {
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.03em;
}
#screen-name h1 span { color: var(--accent); }
#screen-name p { color: var(--muted); font-size: 1rem; max-width: 380px; }
#name-input {
  width: 100%;
  max-width: 320px;
  padding: .75rem 1rem;
  border-radius: .5rem;
  border: 2px solid #333;
  background: var(--surface);
  color: var(--text);
  font-size: 1.1rem;
  text-align: center;
  transition: border-color .2s;
}
#name-input:focus { border-color: var(--accent); outline: none; }
#name-input::placeholder { color: var(--muted); }
.btn-primary {
  padding: .75rem 2.5rem;
  border-radius: .5rem;
  background: var(--accent);
  color: #000;
  font-size: 1rem;
  font-weight: 700;
  transition: opacity .2s, transform .1s;
}
.btn-primary:hover { opacity: .9; }
.btn-primary:active { transform: scale(.97); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.existing-sessions {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
}
.existing-sessions h3 { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; }
.session-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .5rem .75rem;
  border-radius: .4rem;
  cursor: pointer;
  transition: background .15s;
  gap: .5rem;
}
.session-item:hover { background: #2a2a2a; }
.session-item .sname { font-weight: 600; }
.session-item .sprog { font-size: .8rem; color: var(--muted); }
.session-item .scont {
  font-size: .75rem;
  background: var(--accent);
  color: #000;
  padding: .2rem .6rem;
  border-radius: 2rem;
  font-weight: 700;
  white-space: nowrap;
}

/* ─── Screen 2: Swipe ────────────────────────────────────── */
#screen-swipe { position: relative; gap: 0; padding: 0; }
.swipe-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .75rem 1rem;
  position: relative;
  z-index: 10;
}
.swipe-header .user-name { font-weight: 700; font-size: .95rem; }
.progress-wrap {
  flex: 1;
  margin: 0 1rem;
  height: 4px;
  background: #333;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .3s ease;
}
.skip-btn {
  font-size: .8rem;
  color: var(--muted);
  background: none;
  padding: .25rem .5rem;
  border-radius: .25rem;
  transition: color .2s;
}
.skip-btn:hover { color: var(--text); }

/* Card stack */
.card-stage {
  position: relative;
  width: var(--card-w);
  height: var(--card-h);
  margin: .5rem auto;
  touch-action: none;
  user-select: none;
}
.card {
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--card-bg);
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
  transition: transform .12s ease, box-shadow .12s;
  will-change: transform;
  cursor: grab;
}
.card:active { cursor: grabbing; }
.card.is-next {
  transform: scale(.95) translateY(12px);
  pointer-events: none;
  z-index: 1;
}
.card.is-current { z-index: 2; }
.card.fly-right {
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .4s;
  transform: translateX(120%) rotate(20deg) !important;
  opacity: 0;
}
.card.fly-left {
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .4s;
  transform: translateX(-120%) rotate(-20deg) !important;
  opacity: 0;
}
.card.fly-up {
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .4s;
  transform: translateY(-120%) !important;
  opacity: 0;
}
.card.fly-down {
  transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .4s;
  transform: translateY(120%) !important;
  opacity: 0;
}

.card-poster {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #1a1a1a;
}
.card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}
.card-poster .no-poster {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  color: #333;
  background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
}

/* Swipe hint overlays */
.hint-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: .05em;
  opacity: 0;
  pointer-events: none;
  border-radius: var(--radius);
  transition: opacity .1s;
}
.hint-right  { background: rgba(75,222,128,.15); color: var(--col-yes); border: 3px solid var(--col-yes); }
.hint-left   { background: rgba(232,75,75,.15);  color: var(--col-no);  border: 3px solid var(--col-no); }
.hint-up     { background: rgba(232,184,75,.15); color: var(--col-up);  border: 3px solid var(--col-up); }
.hint-down   { background: rgba(75,157,232,.15); color: var(--col-down);border: 3px solid var(--col-down); }

.card-info {
  padding: .75rem 1rem;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.6) 100%);
}
.card-title {
  font-size: clamp(.9rem, 3vw, 1.1rem);
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: .15rem;
}
.card-year { font-size: .8rem; color: var(--muted); }

/* Action buttons */
.action-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: .75rem;
  padding: .75rem 1rem 1rem;
  width: 100%;
}
.act-btn {
  width: 3.2rem;
  height: 3.2rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.act-btn:hover  { transform: scale(1.12); }
.act-btn:active { transform: scale(.95); }
.act-no   { background: var(--col-no);   color: #fff; }
.act-down { background: var(--col-down); color: #fff; }
.act-up   { background: var(--col-up);   color: #000; }
.act-yes  { background: var(--col-yes);  color: #000; }
.act-btn .label {
  display: block;
  font-size: .55rem;
  font-weight: 700;
  line-height: 1;
  text-align: center;
  margin-top: .1rem;
  letter-spacing: .02em;
}
.act-btn-inner { display: flex; flex-direction: column; align-items: center; }

/* Legend */
.legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .3rem .75rem;
  padding: 0 1rem .5rem;
  width: 100%;
  font-size: .72rem;
  color: var(--muted);
}
.legend-item { display: flex; align-items: center; gap: .3rem; }
.legend-dot {
  width: .55rem; height: .55rem; border-radius: 50%; flex-shrink: 0;
}

/* ─── Screen 3: Grid ─────────────────────────────────────── */
#screen-grid {
  max-width: 100%;
  padding: 1rem;
  gap: 1.5rem;
}
.grid-header {
  text-align: center;
  padding: 1rem 0 .5rem;
}
.grid-header h2 {
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  font-weight: 800;
}
.grid-header p { color: var(--muted); font-size: .9rem; margin-top: .4rem; }
.grid-controls {
  display: flex;
  gap: .5rem;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-outline {
  padding: .5rem 1.2rem;
  border-radius: .5rem;
  border: 2px solid #333;
  background: none;
  color: var(--text);
  font-size: .85rem;
  font-weight: 600;
  transition: border-color .2s, background .2s;
}
.btn-outline:hover { border-color: var(--accent); background: rgba(232,184,75,.08); }
.btn-outline.active { border-color: var(--accent); background: rgba(232,184,75,.15); color: var(--accent); }
.film-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .75rem;
  width: 100%;
  max-width: 1000px;
  padding-bottom: 2rem;
}
.film-tile {
  border-radius: .6rem;
  overflow: hidden;
  background: var(--surface);
  position: relative;
  aspect-ratio: 2/3;
  cursor: default;
  transition: transform .15s, box-shadow .15s;
}
.film-tile:hover { transform: scale(1.04); box-shadow: 0 6px 24px rgba(0,0,0,.5); }
.film-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.film-tile .tile-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, transparent 100%);
  padding: 1.5rem .5rem .4rem;
  font-size: .7rem;
  font-weight: 600;
  line-height: 1.3;
  opacity: 0;
  transition: opacity .2s;
}
.film-tile:hover .tile-label { opacity: 1; }
.film-tile .no-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: .5rem;
  padding: .5rem;
  text-align: center;
  font-size: .7rem;
  color: var(--muted);
  background: var(--surface);
}
.film-tile .no-img span { font-size: 2rem; }

/* Tabs */
.tab-bar {
  display: flex;
  gap: .25rem;
  background: var(--surface);
  border-radius: .6rem;
  padding: .25rem;
}
.tab {
  padding: .4rem .9rem;
  border-radius: .4rem;
  font-size: .82rem;
  font-weight: 600;
  background: none;
  color: var(--muted);
  transition: background .15s, color .15s;
}
.tab.active { background: var(--accent); color: #000; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }

/* ─── Toast ──────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(4rem);
  background: var(--surface);
  color: var(--text);
  padding: .6rem 1.4rem;
  border-radius: 2rem;
  font-size: .85rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  transition: transform .3s ease;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ─── Loader ─────────────────────────────────────────────── */
.spinner {
  width: 2rem; height: 2rem;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Responsive ─────────────────────────────────────────── */
@media (max-width: 400px) {
  .act-btn { width: 2.8rem; height: 2.8rem; font-size: 1.2rem; }
  .action-row { gap: .5rem; }
}
@media (min-width: 700px) {
  .film-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
</style>
</head>

<!-- ─── Screen 1: Name ──────────────────────────────────── -->
<section id="screen-name" class="screen active" aria-label="Welcome screen">
  <h1>Cinema<span>Life</span></h1>
  <p>Every mainstream film shown in UK cinemas from 1983 to today. Which ones have you seen?</p>
  <input id="name-input" type="text" placeholder="Your first name…" maxlength="40"
         autocomplete="given-name" aria-label="Enter your name" />
  <button id="start-btn" class="btn-primary" disabled>Let's go →</button>
  <div id="sessions-wrap" style="display:none" class="existing-sessions">
    <h3>Continue a session</h3>
    <div id="sessions-list"></div>
  </div>
</section>

<!-- ─── Screen 2: Swipe ─────────────────────────────────── -->
<section id="screen-swipe" class="screen" aria-label="Film rating screen">
  <header class="swipe-header">
    <span class="user-name" id="swipe-username"></span>
    <div class="progress-wrap" role="progressbar" aria-label="Progress" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <button class="skip-btn" id="results-btn" aria-label="View results so far">Results</button>
  </header>

  <div class="card-stage" id="card-stage"
       role="region" aria-label="Film card"
       aria-live="polite">
    <!-- Cards injected by JS -->
  </div>

  <div class="action-row" role="group" aria-label="Rating buttons">
    <button class="act-btn act-no"   id="btn-no"   aria-label="No, not interested (swipe left)">
      <span class="act-btn-inner">✕<span class="label">No</span></span>
    </button>
    <button class="act-btn act-down" id="btn-down"  aria-label="Yes, but wouldn't watch again (swipe down)">
      <span class="act-btn-inner">↓<span class="label">Seen/Meh</span></span>
    </button>
    <button class="act-btn act-up"   id="btn-up"    aria-label="No, but interested (swipe up)">
      <span class="act-btn-inner">↑<span class="label">Want</span></span>
    </button>
    <button class="act-btn act-yes"  id="btn-yes"   aria-label="Yes, would watch again (swipe right)">
      <span class="act-btn-inner">✓<span class="label">Yes!</span></span>
    </button>
  </div>

  <div class="legend" aria-label="Key">
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-no)"></div>← Not seen, not interested</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-yes)"></div>→ Seen, would watch again</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-down)"></div>↓ Seen, wouldn't watch again</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-up)"></div>↑ Not seen, but interested</div>
  </div>
</section>

<!-- ─── Screen 3: Grid ──────────────────────────────────── -->
<section id="screen-grid" class="screen" aria-label="Your film collection">
  <div class="grid-header">
    <h2 id="grid-title">Your Films</h2>
    <p id="grid-subtitle"></p>
  </div>
  <div class="grid-controls">
    <div class="tab-bar" role="tablist">
      <button class="tab active" role="tab" data-tab="yes"  aria-selected="true">Would watch ✓</button>
      <button class="tab"        role="tab" data-tab="up"   aria-selected="false">Want to see ↑</button>
      <button class="tab"        role="tab" data-tab="down" aria-selected="false">Seen/Meh ↓</button>
    </div>
    <button class="btn-outline" id="back-btn">← Keep going</button>
    <button class="btn-outline" id="restart-btn">New session</button>
  </div>
  <div class="film-grid" id="film-grid" role="list"></div>
</section>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

      const rTitle = (r['#TITLE'] || '').toLowerCase();
      if (rTitle === titleLow || rTitle.startsWith(titleLow)) {
        if (!best || Math.abs((r['#YEAR']||0) - year) < Math.abs((best['#YEAR']||0) - year)) {
          best = r;
        }
      }
    }
    // Fallback: first result
    if (!best && results.length) best = results[0];
    const url = best ? (best['#IMG_POSTER'] || null) : null;
    posterCache[key] = url;
    savePosterCache();
    return url;
  } catch {
    posterCache[key] = null;
    return null;
  }
}

// ─── DOM helpers ───────────────────────────────────────────
const $ = id => document.getElementById(id);
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
function toast(msg, dur = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), dur);
}

// ─── Screen 1: Name ────────────────────────────────────────
function initNameScreen() {
  const input = $('name-input');
  const btn   = $('start-btn');

  input.addEventListener('input', () => {
    btn.disabled = input.value.trim().length < 1;
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !btn.disabled) startSession(input.value.trim());
  });
  btn.addEventListener('click', () => startSession(input.value.trim()));

  // Show existing sessions
  const all = loadStorage();
  const names = Object.keys(all);
  if (names.length) {
    const wrap = $('sessions-wrap');
    const list = $('sessions-list');
    wrap.style.display = '';
    list.innerHTML = '';
    names.forEach(name => {
      const s = all[name];
      const total = FILMS.length;
      const done  = s.index;
      const pct   = Math.round(done / total * 100);
      const div = document.createElement('div');
      div.className = 'session-item';
      div.setAttribute('role', 'button');
      div.setAttribute('tabindex', '0');
      div.setAttribute('aria-label', `Continue ${name}'s session, ${pct}% complete`);
      div.innerHTML = `
        <span class="sname">${escHtml(name)}</span>
        <span class="sprog">${pct}% done (${done.toLocaleString()} / ${total.toLocaleString()})</span>
        <span class="scont">Continue</span>`;
      div.addEventListener('click', () => continueSession(name, s));
      div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') continueSession(name, s); });
      list.appendChild(div);
    });
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startSession(name) {
  const all = loadStorage();
  if (all[name]) {
    continueSession(name, all[name]);
  } else {
    state = { name, index: 0, answers: {} };
    saveState();
    loadPosterCache();
    showSwipeScreen();
  }
}

function continueSession(name, saved) {
  state = { name, index: saved.index || 0, answers: saved.answers || {} };
  loadPosterCache();
  showSwipeScreen();
}

// ─── Screen 2: Swipe ───────────────────────────────────────
function showSwipeScreen() {
  showScreen('screen-swipe');
  $('swipe-username').textContent = state.name;
  updateProgress();
  renderCards();
  bindSwipeControls();
}

function updateProgress() {
  const pct = state.index / FILMS.length * 100;
  $('progress-bar').style.width = pct + '%';
  $('progress-bar').setAttribute('aria-valuenow', Math.round(pct));
}

// Build two cards: current + next (for stack effect)
function renderCards() {
  const stage = $('card-stage');
  stage.innerHTML = '';

  if (state.index >= FILMS.length) {
    // All done
    showGridScreen();
    return;
  }

  // Next card (behind)
  if (state.index + 1 < FILMS.length) {
    const nextCard = buildCard(state.index + 1, false);
    nextCard.classList.add('is-next');
    stage.appendChild(nextCard);
  }

  // Current card
  const card = buildCard(state.index, true);
  card.classList.add('is-current');
  stage.appendChild(card);

  // Fetch poster for current + preload next
  loadCardPoster(card, FILMS[state.index]);
  if (state.index + 1 < FILMS.length) {
    const nextEl = stage.querySelector('.is-next');
    if (nextEl) loadCardPoster(nextEl, FILMS[state.index + 1]);
  }
}

function buildCard(idx, isCurrent) {
  const film = FILMS[idx];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.idx = idx;
  card.setAttribute('aria-label', `${film.t} (${film.y})`);

  card.innerHTML = `
    <div class="card-poster">
      <div class="no-poster" aria-hidden="true">🎬</div>
    </div>
    <div class="hint-overlay hint-right"  aria-hidden="true">SEEN ✓</div>
    <div class="hint-overlay hint-left"   aria-hidden="true">NOPE ✕</div>
    <div class="hint-overlay hint-up"     aria-hidden="true">WANT ↑</div>
    <div class="hint-overlay hint-down"   aria-hidden="true">MEH ↓</div>
    <div class="card-info">
      <div class="card-title">${escHtml(film.t)}</div>
      <div class="card-year">${film.y}</div>
    </div>`;
  return card;
}

async function loadCardPoster(cardEl, film) {
  const url = await fetchPoster(film.t, film.y);
  if (!url) return;
  const posterDiv = cardEl.querySelector('.card-poster');
  if (!posterDiv) return;
  setPosterImage(posterDiv, url, film.t);
}

function setPosterImage(posterDiv, url, title) {
  const img = new Image();
  img.alt = title + ' poster';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  img.onload = () => {
    if (posterDiv.isConnected) {
      posterDiv.innerHTML = '';
      posterDiv.appendChild(img);
    }
  };
  img.onerror = () => {};
  img.src = url;
  // If already cached by browser, onload may fire synchronously before we attach
  if (img.complete && img.naturalWidth > 0) {
    posterDiv.innerHTML = '';
    posterDiv.appendChild(img);
  }
}

// ─── Answer & advance ──────────────────────────────────────
function answer(direction) {
  if (state.index >= FILMS.length) return;

  const stage = $('card-stage');
  const card  = stage.querySelector('.is-current');
  if (!card) return;

  // Record answer
  state.answers[state.index] = direction;
  state.index++;
  saveState();
  updateProgress();

  // Animate out
  const flyClass = {
    yes: 'fly-right', no: 'fly-left', up: 'fly-up', down: 'fly-down'
  }[direction];
  card.classList.add(flyClass);

  // Promote next card
  const nextCard = stage.querySelector('.is-next');
  if (nextCard) {
    nextCard.classList.remove('is-next');
    nextCard.classList.add('is-current');
    // Fetch poster for the card after next
    if (state.index + 1 < FILMS.length) {
      loadCardPoster(nextCard, FILMS[state.index]);
    }
  }

  // After animation, clean up and add new next card
  setTimeout(() => {
    card.remove();
    if (state.index >= FILMS.length) {
      showGridScreen();
      return;
    }
    // Add new next card to back of stack
    if (state.index + 1 < FILMS.length) {
      const newNext = buildCard(state.index + 1, false);
      newNext.classList.add('is-next');
      stage.insertBefore(newNext, stage.firstChild);
      loadCardPoster(newNext, FILMS[state.index + 1]);
    }
  }, 420);
}

// ─── Drag / swipe controls ─────────────────────────────────
function bindSwipeControls() {
  // Button controls
  $('btn-yes').addEventListener('click',  () => answer('yes'));
  $('btn-no').addEventListener('click',   () => answer('no'));
  $('btn-up').addEventListener('click',   () => answer('up'));
  $('btn-down').addEventListener('click', () => answer('down'));
  $('results-btn').addEventListener('click', showGridScreen);
  $('back-btn').addEventListener('click',    showSwipeScreen);
  $('restart-btn').addEventListener('click', confirmRestart);

  // Keyboard
  document.addEventListener('keydown', onKeyDown);

  // Touch / mouse drag
  const stage = $('card-stage');
  stage.addEventListener('mousedown',  dragStart);
  stage.addEventListener('touchstart', dragStart, { passive: true });
  stage.addEventListener('mousemove',  dragMove);
  stage.addEventListener('touchmove',  dragMove, { passive: false });
  stage.addEventListener('mouseup',    dragEnd);
  stage.addEventListener('touchend',   dragEnd);
  stage.addEventListener('mouseleave', dragEnd);
}

function onKeyDown(e) {
  if ($('screen-swipe').classList.contains('active')) {
    if (e.key === 'ArrowRight') answer('yes');
    if (e.key === 'ArrowLeft')  answer('no');
    if (e.key === 'ArrowUp')    answer('up');
    if (e.key === 'ArrowDown')  answer('down');
  }
}

function getEventXY(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function dragStart(e) {
  const card = $('card-stage').querySelector('.is-current');
  if (!card) return;
  const { x, y } = getEventXY(e);
  dragState = { startX: x, startY: y, card };
}

function dragMove(e) {
  if (!dragState) return;
  if (e.cancelable) e.preventDefault();
  const { x, y } = getEventXY(e);
  const dx = x - dragState.startX;
  const dy = y - dragState.startY;
  const rot = dx * 0.06;
  dragState.card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;

  // Show hints
  const hints = dragState.card.querySelectorAll('.hint-overlay');
  hints.forEach(h => h.style.opacity = '0');
  const threshold = 40;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx > absDy) {
    if (dx > threshold)       dragState.card.querySelector('.hint-right').style.opacity = Math.min((dx - threshold) / 80, 1);
    else if (dx < -threshold) dragState.card.querySelector('.hint-left').style.opacity  = Math.min((-dx - threshold) / 80, 1);
  } else {
    if (dy < -threshold)      dragState.card.querySelector('.hint-up').style.opacity    = Math.min((-dy - threshold) / 80, 1);
    else if (dy > threshold)  dragState.card.querySelector('.hint-down').style.opacity  = Math.min((dy - threshold) / 80, 1);
  }
}

function dragEnd(e) {
  if (!dragState) return;
  const { x, y } = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : { x: e.clientX, y: e.clientY };
  const dx = x - dragState.startX;
  const dy = y - dragState.startY;
  const THRESHOLD = 80;

  // Reset hints
  dragState.card.querySelectorAll('.hint-overlay').forEach(h => h.style.opacity = '0');

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > THRESHOLD)       { dragState = null; answer('yes'); return; }
    if (dx < -THRESHOLD)      { dragState = null; answer('no');  return; }
  } else {
    if (dy < -THRESHOLD)      { dragState = null; answer('up');   return; }
    if (dy > THRESHOLD)       { dragState = null; answer('down'); return; }
  }

  // Snap back
  dragState.card.style.transform = '';
  dragState = null;
}

// ─── Screen 3: Grid ────────────────────────────────────────
function showGridScreen() {
  // Remove keyboard listener to avoid conflicts
  document.removeEventListener('keydown', onKeyDown);
  showScreen('screen-grid');
  renderGrid(currentTab);

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentTab = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === currentTab);
        t.setAttribute('aria-selected', t.dataset.tab === currentTab);
      });
      renderGrid(currentTab);
    });
  });

  $('back-btn').addEventListener('click', () => {
    document.addEventListener('keydown', onKeyDown);
    showSwipeScreen();
  });
  $('restart-btn').addEventListener('click', confirmRestart);
}

function renderGrid(tab) {
  const grid = $('film-grid');
  grid.innerHTML = '';

  const films = FILMS
    .map((f, i) => ({ ...f, idx: i }))
    .filter(f => state.answers[f.idx] === tab);

  // Update header
  const labels = { yes: 'Would watch again', up: 'Want to see', down: 'Seen but meh' };
  $('grid-title').textContent = `${state.name}'s Films`;
  $('grid-subtitle').textContent = `${films.length} film${films.length !== 1 ? 's' : ''} — ${labels[tab]}`;

  if (!films.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="emoji">🎬</div>
      <p>No films here yet. Keep swiping!</p>
    </div>`;
    return;
  }

  films.forEach(film => {
    const tile = document.createElement('div');
    tile.className = 'film-tile';
    tile.setAttribute('role', 'listitem');
    tile.setAttribute('aria-label', `${film.t} (${film.y})`);

    // Check poster cache
    const url = posterCache[film.t];
    if (url) {
      tile.innerHTML = `<img src="${escHtml(url)}" alt="${escHtml(film.t)} poster" loading="lazy">
        <div class="tile-label">${escHtml(film.t)}</div>`;
    } else {
      tile.innerHTML = `<div class="no-img"><span>🎬</span>${escHtml(film.t)}</div>`;
      // Lazy-load poster
      fetchPoster(film.t, film.y).then(imgUrl => {
        if (!imgUrl) return;
        tile.innerHTML = `<img src="${escHtml(imgUrl)}" alt="${escHtml(film.t)} poster" loading="lazy">
          <div class="tile-label">${escHtml(film.t)}</div>`;
      });
    }
    grid.appendChild(tile);
  });
}

function confirmRestart() {
  if (confirm(`Start a new session? Your progress for "${state.name}" will be cleared.`)) {
    const all = loadStorage();
    delete all[state.name];
    saveStorage(all);
    location.reload();
  }
}

// ─── Init ──────────────────────────────────────────────────
loadPosterCache();
initNameScreen();
</script>
